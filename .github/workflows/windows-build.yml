name: Windows Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches:
      - main
    tags:
      - "latest"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip uninstall -y python-magic
          pip install python-magic-bin
          pip install pyinstaller

      - name: Build executable (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name Javis --paths src src/ai_content_classifier/main.py

      - name: Create ZIP package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Javis/* -DestinationPath dist/Javis-windows.zip -Force

      - name: Resolve artifact metadata
        id: artifact_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "name=Javis-windows-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "retention=7" >> "$GITHUB_OUTPUT"
          else
            echo "name=Javis-windows-rolling" >> "$GITHUB_OUTPUT"
            echo "retention=90" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: dist/Javis-windows.zip
          if-no-files-found: error
          retention-days: ${{ steps.artifact_meta.outputs.retention }}
