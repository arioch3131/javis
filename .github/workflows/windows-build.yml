name: Windows Build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip uninstall -y python-magic
          pip install python-magic-bin
          pip install pyinstaller

      - name: Build executable (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name Javis --paths src src/ai_content_classifier/main.py

      - name: Create ZIP package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Javis/* -DestinationPath dist/Javis-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: Javis-windows-exe
          path: dist/Javis-windows.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/Javis-windows.zip
